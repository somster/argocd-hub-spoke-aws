# Local override: fixes source_profile to use [default] credentials
# (which have the correct lowercase key format).
# Used via: AWS_CONFIG_FILE=local-aws-config.ini
#
# The real fix is: in ~/.aws/credentials rename uppercase keys:
#   AWS_ACCESS_KEY_ID     → aws_access_key_id
#   AWS_SECRET_ACCESS_KEY → aws_secret_access_key

[default]
region = us-west-2
output = yaml

[profile terraform_vpb]
role_arn = arn:aws:iam::863518459040:role/system/VPB_Terraform_Access
source_profile = default
cli_pager = cat
output = yaml
region = us-west-2
